<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Goon</title>
    <meta name="description" content="Get in touch with Goon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="nav">
        <a href="/" class="logo">Goon</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/blog.html">Blog</a>
            <a href="/contact.html">Contact</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1>Get in touch</h1>
            <p class="hero-sub">Tell us what you're building. We'll reply within a day.</p>
        </section>

        <section class="section">
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="project">What are you building?</label>
                    <textarea id="project" name="project" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Send</button>
            </form>
            <div class="contact-info">
                <p><strong>Email:</strong> hello@goon.studio</p>
                <p><strong>Location:</strong> Lisbon, PT</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Goon. All rights reserved.</p>
        <div class="footer-links">
            <a href="/">Home</a>
            <a href="/blog.html">Blog</a>
        </div>
    </footer>
</body>
</html>
