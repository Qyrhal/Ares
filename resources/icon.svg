<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background (macOS app icon) -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Circle outline -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="#ef4444" stroke-width="14" stroke-opacity="0.9" filter="url(#glow)"/>

  <!-- Outer square outline -->
  <rect x="106" y="106" width="300" height="300" rx="28" ry="28"
        fill="none" stroke="#ef4444" stroke-width="14" stroke-opacity="0.9"
        filter="url(#glow)"/>

  <!-- Inner diamond (square rotated 45°) outline -->
  <rect x="150" y="150" width="212" height="212" rx="22" ry="22"
        fill="none" stroke="#ef4444" stroke-width="14" stroke-opacity="0.9"
        transform="rotate(45 256 256)"
        filter="url(#glow)"/>
</svg>
