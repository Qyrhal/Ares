<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- macOS rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="#0f0f0f"/>

  <!-- Circle outline — mirrors r=29 in 64px viewBox scaled 8× -->
  <circle cx="256" cy="256" r="232" stroke="#ef4444" stroke-width="16" stroke-opacity="0.9"/>

  <!-- Axis-aligned rounded square — mirrors x=13,y=13,w=38,h=38,rx=4 scaled 8× -->
  <rect x="104" y="104" width="304" height="304" rx="32"
        stroke="#ef4444" stroke-width="17.6"/>

  <!-- Diamond (rotated square) — mirrors x=18.5,y=18.5,w=27,h=27,rx=3 scaled 8× -->
  <rect x="148" y="148" width="216" height="216" rx="24"
        stroke="#ef4444" stroke-width="17.6"
        transform="rotate(45 256 256)"/>
</svg>
